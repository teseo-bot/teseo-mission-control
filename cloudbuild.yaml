substitutions:
  _REGION: us-central1
  _IMAGE_REPO: gcr.io/${PROJECT_ID}/teseo-mission-control
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""

steps:
  # ── 1. Build ──────────────────────────────────────────────────────────
  - id: build
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '--progress=plain'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'
      - '-t'
      - '${_IMAGE_REPO}:${COMMIT_SHA}'
      - '-t'
      - '${_IMAGE_REPO}:latest'
      - '.'

  # ── 2. Push ───────────────────────────────────────────────────────────
  - id: push
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE_REPO}'

  # ── 3. Deploy ─────────────────────────────────────────────────────────
  - id: deploy
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'teseo-mission-control'
      - '--image'
      - '${_IMAGE_REPO}:${COMMIT_SHA}'
      - '--region'
      - '${_REGION}'
    waitFor: ['push']

images:
  - '${_IMAGE_REPO}:${COMMIT_SHA}'
  - '${_IMAGE_REPO}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
