steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '--build-arg'
  - 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}'
  - '--build-arg'
  - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'
  - '-t'
  - 'gcr.io/teseobot-487515/teseo-mission-control'
  - '.'
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/teseobot-487515/teseo-mission-control']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'teseo-mission-control'
  - '--image'
  - 'gcr.io/teseobot-487515/teseo-mission-control'
  - '--region'
  - 'us-central1'
images:
- 'gcr.io/teseobot-487515/teseo-mission-control'
options:
  logging: CLOUD_LOGGING_ONLY
